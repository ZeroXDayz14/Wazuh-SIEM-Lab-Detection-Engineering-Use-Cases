<!-- Sanitized Windows Wazuh Agent Configuration -->

<ossec_config>

  <client>
    <server>
      <address>WAZUH-MANAGER-IP</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
  </client>

  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

</ossec_config>
